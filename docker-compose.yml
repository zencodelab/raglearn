version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: govshield-pgvector
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=govshield_db
      - POSTGRES_USER=govshield_user
      - POSTGRES_PASSWORD=govshield_secure_pwd
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  govshield:
    build: .
    container_name: govshield-rag-portal
    ports:
      - "8501:8501"
    environment:
      # Route LLM/embedding requests to the host machine's native Ollama engine
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Connect to the PostgreSQL pgvector service
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=govshield_db
      - POSTGRES_USER=govshield_user
      - POSTGRES_PASSWORD=govshield_secure_pwd
    depends_on:
      - db
    volumes:
      # Bind mount documents to keep files persistent
      - ./data:/app/data
    extra_hosts:
      # Maps host.docker.internal to the gateway IP for cross-platform network resolution
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  govshield-api:
    build: .
    container_name: govshield-rag-api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=govshield_db
      - POSTGRES_USER=govshield_user
      - POSTGRES_PASSWORD=govshield_secure_pwd
    depends_on:
      - db
    volumes:
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  pgdata:
